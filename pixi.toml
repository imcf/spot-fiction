[workspace]
authors = ["Laurent Guerard <laurent.guerard@unibas.ch>"]
channels = ["conda-forge"]
name = "spot-fiction"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "spot-fiction"
view = "spot-fiction-view"
changelog = "git cliff -o CHANGELOG.md"

[dependencies]
python = ">=3.10"
numpy = ">=1.24"
pandas = ">=2.0"
scipy = ">=1.10"
tifffile = ">=2023.1"
hatchling = ">=1.18"
git-cliff = ">=2.0"
napari = ">=0.5"
dask = ">=2024.1"
zarr = ">=3.0"

[pypi-dependencies]
spot-fiction = { path = ".", editable = true }
